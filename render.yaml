services:
  - type: web
    name: murban-backend
    runtime: go
    buildCommand: go build -o server ./cmd/api
    startCommand: ./server
    envVars:
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SHEET_NAME
        value: Sheet1
      - key: GOOGLE_CREDENTIALS_JSON_B64
        sync: false
